<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>2 Years With You ❤️</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ffdde1,#ee9ca7);display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
.card{text-align:center;background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.2);max-width:600px}
button{padding:12px 24px;font-size:18px;border:none;border-radius:30px;cursor:pointer;margin:10px}
#yes{background:#ff4d6d;color:#fff}
#no{background:#eee;position:relative}
.hidden{display:none}
</style></head>
<body>
<div class="card" id="page1">
<h1>Happy 2nd Anniversary ❤️</h1>
<p>Two years, countless memories, and you are my home.</p>
<button onclick="next()">Open Your Surprise</button>
</div>

<div class="card hidden" id="page2">
<h2>Will you keep choosing me for many more adventures?</h2>
<button id="yes" onclick="yes()">Yes ❤️</button>
<button id="no">No</button>
</div>

<script>
function next(){page1.classList.add('hidden');page2.classList.remove('hidden');}
const no=document.getElementById('no');
no.addEventListener('mouseover',()=>{
 no.style.position='fixed';
 no.style.left=Math.random()*(window.innerWidth-120)+'px';
 no.style.top=Math.random()*(window.innerHeight-60)+'px';
});
function yes(){
document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial;text-align:center;background:#fff0f5"><div><h1>I knew you would say YES! ❤️</h1><p>Happy 2nd Anniversary, Hritik.</p><p>Thank you for making every day brighter. Here\'s to many more years together.<br>Love, Isha ❤️</br></p></div></div>';
}
</script>
</body></html>
